<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>La Physique Quantique pour Débutants</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #1a1025; /* Deep dark purple typical of space themes */
            overflow: hidden;
            margin: 0;
            padding: 0;
            width: 1910px;
            height: 1070px;
        }

        /* Animations for dynamic feel without heavy video */
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }

        @keyframes orbit {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .floating-element {
            animation: float 6s ease-in-out infinite;
        }
        
        .floating-element-delayed {
            animation: float 7s ease-in-out infinite;
            animation-delay: 2s;
        }

        .pulse {
            animation: pulse-ring 4s ease-in-out infinite;
        }

        .orbit-slow {
            animation: orbit 20s linear infinite;
        }

        .orbit-medium {
            animation: orbit 12s linear infinite;
        }

        /* Custom shapes */
        .circle-outline {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }
    </style>
</head>
<body class="text-white">
<div class="relative w-full h-full flex flex-col items-center justify-center">
<!-- Background Decor: Abstract Quantum Field -->
<div class="absolute inset-0 z-0 overflow-hidden">
<!-- Large faint circles representing orbitals -->
<div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] border-4 border-[#2d1b4e] rounded-full"></div>
<div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[1000px] h-[1000px] border-2 border-[#2d1b4e] rounded-full opacity-50"></div>
<!-- Floating Particles (Stars/Photons) -->
<div class="absolute top-20 left-20 text-[#00f3ff] opacity-40 text-xs"><i class="fas fa-circle"></i></div>
<div class="absolute bottom-32 right-32 text-[#ff0055] opacity-40 text-xs"><i class="fas fa-circle"></i></div>
<div class="absolute top-40 right-1/4 text-[#ffd700] opacity-30 text-sm"><i class="fas fa-star"></i></div>
<div class="absolute bottom-20 left-1/3 text-white opacity-20 text-xs"><i class="fas fa-circle"></i></div>
<!-- Abstract Wave Lines (SVG) -->
<svg class="absolute bottom-0 left-0 w-full h-64 opacity-20" preserveaspectratio="none" viewbox="0 0 1280 320">
<path d="M0,160 C320,320 640,0 1280,160 L1280,320 L0,320 Z" fill="#00f3ff"></path>
<path d="M0,200 C400,100 800,300 1280,150 L1280,320 L0,320 Z" fill="#2d1b4e"></path>
</svg>
</div>
<!-- Central Illustration Layer -->
<div class="absolute z-0 top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2">
<!-- The "Atom" Core Background -->
<div class="w-96 h-96 bg-[#2d1b4e] rounded-full blur-3xl opacity-50 pulse"></div>
</div>
<!-- Main Content Container -->
<div class="relative z-10 flex flex-col items-center justify-center w-full h-full p-12">
<!-- Top Badge -->
<div class="mb-8 bg-[#00f3ff] text-[#1a1025] px-6 py-2 rounded-full font-bold uppercase tracking-widest text-sm shadow-[0_0_20px_rgba(0,243,255,0.4)] floating-element">
<i class="fas fa-atom mr-2"></i> Introduction Scientifique
            </div>
<!-- Main Title Area -->
<div class="text-center mb-6">
<h1 class="text-8xl font-black leading-tight tracking-tight mb-2 text-transparent bg-clip-text" style="color: white; text-shadow: 4px 4px 0px #2d1b4e;">
                    LA PHYSIQUE<br/>
<span class="text-[#ffd700]">QUANTIQUE</span>
</h1>
<h2 class="text-4xl font-bold mt-2 text-[#ff0055] tracking-wide" style="text-shadow: 2px 2px 0px #2d1b4e;">
                    POUR DÉBUTANTS
                </h2>
</div>
<!-- Subtitle / Tagline -->
<div class="max-w-2xl text-center mb-12 bg-[#1a1025] bg-opacity-80 p-4 rounded-xl border border-gray-700 backdrop-filter backdrop-blur-sm">
<p class="text-xl text-gray-200 leading-relaxed font-light">
                    40 minutes pour démystifier l’infiniment petit.<br/>
<span class="text-[#00f3ff] font-semibold">Dualité</span> • <span class="text-[#ff0055] font-semibold">Superposition</span> • <span class="text-[#ffd700] font-semibold">Intrication</span>
</p>
</div>
<!-- Visual Decorative Icons representing the plan (Floating) -->
<div class="absolute top-1/3 left-32 text-[#ff0055] text-6xl opacity-80 floating-element">
<i class="fas fa-cat"></i> <!-- Schrödinger's Cat -->
</div>
<div class="absolute bottom-1/3 right-32 text-[#00f3ff] text-6xl opacity-80 floating-element-delayed">
<i class="fas fa-microchip"></i> <!-- Quantum Chip -->
</div>
<div class="absolute top-24 right-48 text-[#ffd700] text-4xl opacity-60 floating-element">
<i class="fas fa-wave-square"></i> <!-- Wave -->
</div>
<!-- Footer / Agenda Bar -->
<div class="absolute bottom-10 w-full px-16">
<div class="flex justify-between items-center border-t border-gray-700 pt-6">
<div class="flex items-center space-x-2 text-gray-400 text-sm">
<i class="fas fa-user-graduate"></i>
<span>Niveau : Néophytes</span>
</div>
<div class="flex space-x-12">
<div class="flex flex-col items-center group cursor-pointer">
<div class="w-10 h-10 rounded-full bg-[#2d1b4e] flex items-center justify-center text-[#00f3ff] mb-2 group-hover:bg-[#00f3ff] group-hover:text-[#1a1025] transition-colors">
<i class="fas fa-history"></i>
</div>
<span class="text-xs font-bold uppercase tracking-wide text-gray-300">Historique</span>
</div>
<div class="flex flex-col items-center group cursor-pointer">
<div class="w-10 h-10 rounded-full bg-[#2d1b4e] flex items-center justify-center text-[#ff0055] mb-2 group-hover:bg-[#ff0055] group-hover:text-[#1a1025] transition-colors">
<i class="fas fa-dna"></i>
</div>
<span class="text-xs font-bold uppercase tracking-wide text-gray-300">Principes</span>
</div>
<div class="flex flex-col items-center group cursor-pointer">
<div class="w-10 h-10 rounded-full bg-[#2d1b4e] flex items-center justify-center text-[#ffd700] mb-2 group-hover:bg-[#ffd700] group-hover:text-[#1a1025] transition-colors">
<i class="fas fa-laptop-code"></i>
</div>
<span class="text-xs font-bold uppercase tracking-wide text-gray-300">Informatique</span>
</div>
<div class="flex flex-col items-center group cursor-pointer">
<div class="w-10 h-10 rounded-full bg-[#2d1b4e] flex items-center justify-center text-white mb-2 group-hover:bg-white group-hover:text-[#1a1025] transition-colors">
<i class="fas fa-shield-alt"></i>
</div>
<span class="text-xs font-bold uppercase tracking-wide text-gray-300">Crypto</span>
</div>
</div>
<div class="flex items-center space-x-2 text-gray-400 text-sm">
<span>Janvier 2026</span>
<i class="fas fa-calendar-alt"></i>
</div>
</div>
</div>
</div>
<!-- Geometric Decor: Corner Shapes -->
<div class="absolute top-0 right-0 w-32 h-32 bg-[#ff0055] opacity-10 rounded-bl-full"></div>
<div class="absolute bottom-0 left-0 w-48 h-48 bg-[#00f3ff] opacity-5 rounded-tr-full"></div>
</div>
</body>
</html>
